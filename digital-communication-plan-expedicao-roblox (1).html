<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Digital Communication Plan · Expedição Roblox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#EDEEE8;--surf:#FFF;--sf2:#F6F7F2;
  --ink:#18180F;--muted:#6A6D62;--faint:#93968B;
  --hl:#DCDDD3;--hls:#C7C9BC;
  --dark:#181812;--dark2:#211F18;
  --on:#EFEFE6;--on2:#A6A89A;
  --discord:#6B74F0;
  --pub:#178A5A;--skip:#6A6D62;--plan:#D97706;--reach:#0891B2;
  --pc:#E8472B;
  --panel:#2D2E25;--panel2:#383930;--panel-line:rgba(255,255,255,.09);
  --display:"Space Grotesk",system-ui,sans-serif;
  --body:"Instrument Sans",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;
  --rl:18px;--rm:12px;--rs:9px;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--body);background:#fff;color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:10;
  background:var(--dark);border-bottom:1px solid rgba(255,255,255,.07);
  height:54px;padding:0 64px;
  display:flex;align-items:center;gap:0;
}
.brand{
  font-family:var(--display);font-size:14px;font-weight:600;
  letter-spacing:-.01em;color:var(--on);
  display:flex;align-items:center;gap:9px;margin-right:auto;
}
.brand-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--pc);transition:background .35s var(--ease);
}
.phase-chip{
  font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--pc);border:1px solid color-mix(in srgb,var(--pc) 40%,transparent);
  border-radius:100px;padding:5px 12px;
}

/* ── PROGRAM HEADER ── */
.prog-hd{
  padding:28px 64px 20px;
  display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;
}
.prog-eyebrow{
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);margin:0 0 8px;
}
.prog-title{
  font-family:var(--display);font-weight:600;
  font-size:clamp(22px,3vw,32px);letter-spacing:-.02em;margin:0;line-height:1;
}
.prog-subtitle{
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  color:var(--faint);margin:6px 0 0;
}
.prog-stats{display:flex;gap:20px}
.pstat{text-align:right}
.pstat-n{
  font-family:var(--display);font-weight:600;
  font-size:26px;letter-spacing:-.02em;line-height:1;
}
.pstat-l{
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--faint);margin-top:3px;
}

/* ── PROGRAM GRID ── */
.prog-wrap{padding:0 64px 80px;overflow-x:auto;background:#fff}

.prog-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:0;
  min-width:700px;
  background:#fff;
  border-radius:var(--rm);
  overflow:hidden;
}

/* Column headers */
.col-hd{
  padding:16px 14px 16px;
  display:flex;flex-direction:column;gap:0;
  background:#fff;
  border-bottom:3px solid var(--dc,#E8472B);
}
.col-hd .ch-day{
  font-family:var(--display);font-weight:700;font-size:18px;
  letter-spacing:-.02em;line-height:1;color:var(--dc,#E8472B);
}
.col-hd .ch-theme{
  font-family:var(--mono);font-size:10px;letter-spacing:.07em;
  text-transform:uppercase;color:var(--faint);margin-top:8px;
}
.col-hd .ch-syn{
  font-size:13px;line-height:1.45;color:var(--muted);
  margin-top:8px;
}
.col-hd-corner{padding:16px 14px 16px;background:#fff}

/* Phase divider row */
.phase-row{
  grid-column:1/-1;
  display:grid;
  grid-template-columns:auto 1fr;
  grid-template-rows:auto auto;
  gap:2px 20px;
  padding:28px 16px 20px;
  margin-top:0;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.phase-row-name{
  font-family:var(--display);font-weight:700;font-size:17px;
  letter-spacing:-.02em;color:var(--phc);
  grid-row:1;grid-column:1;align-self:center;
}
.phase-row-weeks{
  font-family:var(--mono);font-size:10px;letter-spacing:.07em;
  text-transform:uppercase;color:var(--phc);opacity:.6;
  grid-row:1;grid-column:2;align-self:center;
}
.phase-row-desc{
  font-size:13px;color:var(--muted);line-height:1.5;
  grid-row:2;grid-column:1/-1;margin-top:5px;
}

/* Week label column */
.week-lbl{
  display:flex;flex-direction:column;justify-content:center;
  padding:14px 12px;
  background:#fff;border:0;
  border-bottom:1px solid rgba(0,0,0,.07);
  cursor:pointer;
  transition:background .15s var(--ease);
}
.week-lbl:hover{background:var(--sf2)}
.week-lbl.curr{
  background:#EFEFEF;
}
.week-lbl.curr .wl-num{color:var(--ink)}
.week-lbl.curr .wl-note-icon{color:var(--muted)}
.wl-num{
  font-family:var(--display);font-weight:600;font-size:13px;
  letter-spacing:-.01em;line-height:1;color:var(--ink);
}
.wl-note-icon{
  font-size:11px;color:var(--faint);margin-top:4px;
  display:flex;align-items:center;gap:4px;
}
.wl-note-icon.has-note{color:var(--plan)}

/* Grid cells */
.gcell{
  appearance:none;text-align:left;font:inherit;color:inherit;
  min-height:100px;padding:16px 14px;
  background:#fff;border:0;
  border-top:3px solid transparent;
  display:flex;flex-direction:column;justify-content:flex-start;gap:8px;
  transition:background .2s var(--ease),border-color .15s var(--ease);
  position:relative;cursor:pointer;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.gcell:focus-visible{outline:2px solid var(--dc,#E8472B);outline-offset:-2px;z-index:2}

/* Empty cell */
.gcell--empty{
  background:var(--sf2);
  justify-content:center;
}
.gcell--empty:hover{
  background:color-mix(in srgb,var(--dc,#E8472B) 7%,var(--sf2));
}
.cell-plus{
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid var(--hls);
  color:var(--hls);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:300;line-height:1;
  margin:auto;
  transition:border-color .2s var(--ease),color .2s var(--ease),transform .2s var(--ease);
}
.gcell--empty:hover .cell-plus{
  border-color:var(--dc,#E8472B);
  color:var(--dc,#E8472B);
  transform:scale(1.1);
}

/* Filled cell */
.gcell--filled{
  background:#fff;
  border-top-color:var(--dc,#E8472B);
}
.gcell--filled:hover{
  background:color-mix(in srgb,var(--dc,#E8472B) 6%,#fff);
  z-index:1;
}

/* Current week row */
.gcell.curr-row.gcell--empty{
  background:#F5F5F5;
}
.gcell.curr-row.gcell--filled{
  background:#F5F5F5;
}


/* Filled cell */
.cell-icon{
  width:20px;height:20px;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  margin-right:8px;margin-top:1px;
}
.cell-icon svg{width:20px;height:20px;display:block;overflow:visible}
.popt-icon{
  width:24px;height:24px;flex-shrink:0;opacity:.85;
  display:inline-flex;align-items:center;margin-right:11px;
  color:var(--c,inherit);
}
.popt-icon svg{width:24px;height:24px;display:block}
.dr-title-icon{
  display:inline-flex;align-items:center;margin-right:10px;
  opacity:.85;vertical-align:middle;
  color:var(--c,#E8472B);
}
.dr-title-icon svg{width:22px;height:22px;display:block}
.cell-title{
  font-family:var(--display);font-weight:600;
  font-size:13.5px;letter-spacing:-.01em;line-height:1.2;color:var(--ink);
  display:flex;align-items:center;
}
.cell-meta{
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
}
.cell-status{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.cell-status.planned  {background:var(--plan)}
.cell-status.published{background:var(--pub)}
.cell-status.skipped  {background:var(--skip)}
.cell-reach{
  font-family:var(--mono);font-size:8px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--reach);
}

/* ── DRAWER ── */
.backdrop{
  position:fixed;inset:0;background:rgba(18,18,12,.18);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .25s var(--ease);z-index:40;
}
.backdrop.open{opacity:1;pointer-events:auto}

.drawer{
  position:fixed;top:0;right:0;width:520px;max-width:100%;height:100dvh;
  background:#fff;color:var(--ink);
  box-shadow:-1px 0 0 rgba(0,0,0,.08),-12px 0 32px -8px rgba(18,18,12,.12);
  transform:translateX(100%);transition:transform .3s var(--ease);
  z-index:50;display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0)}

.dr-hd{
  padding:22px 24px 20px;position:relative;
  border-bottom:1px solid rgba(0,0,0,.07);flex-shrink:0;
}
.dr-hd::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:3px;
  background:var(--c,#E8472B);
}
.dr-kick{
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--c,#E8472B);margin-bottom:9px;
}
.dr-hd h2{
  font-family:var(--display);font-weight:700;font-size:24px;
  letter-spacing:-.02em;margin:0;line-height:1.1;padding-right:36px;color:var(--ink);
  display:flex;align-items:center;gap:10px;
}
.dr-hd .sub{margin:7px 0 0;font-size:14px;color:var(--muted)}
.close-btn{
  position:absolute;top:20px;right:20px;width:30px;height:30px;
  border:1px solid rgba(0,0,0,.1);background:transparent;color:var(--muted);
  border-radius:var(--rs);font-size:14px;line-height:1;
  display:grid;place-items:center;transition:background .15s var(--ease),color .15s var(--ease);
  cursor:pointer;
}
.close-btn:hover{background:var(--sf2);color:var(--ink)}

.exec-bar{
  display:flex;align-items:center;gap:12px;padding:11px 24px;
  background:#F5F5F5;border-bottom:1px solid rgba(0,0,0,.07);flex-shrink:0;
}
.exec-lbl{
  font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--faint);flex-shrink:0;
}
.exec-btns{display:flex;gap:5px}
.exec-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  background:#fff;color:var(--muted);
  border:1px solid rgba(0,0,0,.12);border-radius:100px;padding:6px 12px;
  cursor:pointer;transition:all .15s var(--ease);
}
.exec-btn:hover{color:var(--ink);border-color:rgba(0,0,0,.25)}
.exec-btn.active[data-s="planned"]  {color:var(--plan);background:color-mix(in srgb,var(--plan) 10%,transparent);border-color:var(--plan)}
.exec-btn.active[data-s="published"]{color:var(--pub); background:color-mix(in srgb,var(--pub)  10%,transparent);border-color:var(--pub)}
.exec-btn.active[data-s="skipped"]  {color:var(--skip);background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.2)}
.exec-actions{display:flex;align-items:center;gap:6px;margin-left:auto}
.change-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  background:transparent;color:var(--muted);border:1px solid rgba(0,0,0,.12);
  border-radius:100px;padding:6px 12px;flex-shrink:0;cursor:pointer;
  transition:all .15s var(--ease);
}
.change-btn:hover{color:var(--ink);border-color:rgba(0,0,0,.28)}
.remove-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  background:transparent;color:#dc2626;
  border:1px solid color-mix(in srgb,#dc2626 28%,transparent);
  border-radius:100px;padding:6px 12px;flex-shrink:0;cursor:pointer;
  transition:all .15s var(--ease);
}
.remove-btn:hover{border-color:#dc2626;background:color-mix(in srgb,#dc2626 5%,transparent)}

.dr-body{padding:20px 24px 40px;overflow-y:auto;flex:1}

.goal-strip{
  display:flex;align-items:baseline;gap:10px;font-size:14px;line-height:1.45;
  padding:11px 13px;background:#F5F5F5;
  border-radius:var(--rs);margin-bottom:18px;color:var(--ink);
}
.goal-strip b{
  font-family:var(--mono);font-weight:400;font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--faint);flex-shrink:0;
}

.detail-skills{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:10px 13px;margin-bottom:16px;
  background:#F5F5F5;border-radius:var(--rs);
}
.dsk-lbl{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--faint);flex-shrink:0;
}
.dsk-pills{display:flex;flex-wrap:wrap;gap:5px}
.dsk-pill{
  font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;
  color:var(--c,#E8472B);
  background:color-mix(in srgb,var(--c,#E8472B) 10%,transparent);
  border:1px solid color-mix(in srgb,var(--c,#E8472B) 25%,transparent);
  border-radius:100px;padding:4px 10px;white-space:nowrap;
}

.channel{
  --ch:var(--c,#E8472B);
  border:1px solid rgba(0,0,0,.07);
  border-left:3px solid var(--ch);
  border-radius:var(--rm);overflow:hidden;background:#fff;margin-bottom:14px;
}
.channel--discord{--ch:var(--discord)}
.ch-hd{
  display:flex;align-items:center;gap:10px;padding:11px 13px;
  background:color-mix(in srgb,var(--ch) 6%,#F5F5F5);
  border-bottom:1px solid rgba(0,0,0,.06);
}
.ch-icon{
  width:26px;height:26px;flex-shrink:0;display:grid;place-items:center;
  border-radius:7px;background:var(--ch);color:#fff;
}
.ch-icon svg{width:13px;height:13px;display:block}
.ch-id{flex:1;min-width:0}
.ch-name{font-family:var(--display);font-weight:600;font-size:14px;letter-spacing:-.01em;line-height:1.1;color:var(--ink)}
.ch-meta{font-size:12px;color:var(--muted);margin-top:1px}
.ch-tag{
  font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ch);border:1px solid color-mix(in srgb,var(--ch) 35%,transparent);
  border-radius:100px;padding:4px 10px;flex-shrink:0;
}
.ch-body{padding:13px 13px 14px}
.lane+.lane{margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,0,0,.07)}
.lane-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.lane-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.ready-tag{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ch);flex-shrink:0;
}
.ready-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ch)}
.lane--pub .caption-box{border-left:2px solid var(--ch)}
.ch-desc{font-size:14px;line-height:1.5;margin:0 0 4px;color:var(--ink)}
.field{font-size:13.5px;line-height:1.4;margin-top:10px;color:var(--ink)}
.field b{
  font-family:var(--mono);font-weight:400;font-size:10px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:3px;
}
.dr-sec{
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);margin:14px 0 9px;display:flex;align-items:center;gap:8px;
}
.dr-sec::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.07)}
.script{counter-reset:beat;border-left:2px solid var(--c,#E8472B);padding-left:16px;display:grid;gap:12px}
.beat{position:relative}
.beat::before{
  counter-increment:beat;content:counter(beat,decimal-leading-zero);
  position:absolute;left:-26px;top:0;font-family:var(--mono);font-size:10px;color:var(--c,#E8472B);
}
.beat-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.beat-txt{font-size:14px;line-height:1.45;color:var(--ink)}
.caption-box{background:#F5F5F5;border:1px solid rgba(0,0,0,.07);border-radius:var(--rm);padding:12px 13px}
.caption-box p{margin:0 0 10px;font-size:14px;line-height:1.5;color:var(--ink)}
.copy-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--c,#E8472B);color:#fff;border:0;border-radius:var(--rs);
  padding:7px 12px;font-weight:700;cursor:pointer;transition:filter .15s var(--ease);
}
.copy-btn:hover{filter:brightness(1.08)}
.copy-btn.done{background:rgba(0,0,0,.08);color:var(--muted)}
.checklist{display:grid;gap:1px}
.checklist label{
  display:flex;gap:10px;align-items:flex-start;font-size:13.5px;line-height:1.4;color:var(--ink);
  padding:9px 0;border-bottom:1px solid rgba(0,0,0,.06);cursor:pointer;
}
.checklist label:last-of-type{border-bottom:0}
.checklist input{
  appearance:none;width:15px;height:15px;flex-shrink:0;margin-top:1px;
  border:1.5px solid rgba(0,0,0,.2);border-radius:4px;position:relative;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.checklist input:checked{background:var(--c);border-color:var(--c)}
.checklist input:checked::after{
  content:'';position:absolute;left:4px;top:1px;
  width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);
}
.care-alert{
  display:flex;align-items:flex-start;gap:11px;
  background:color-mix(in srgb,var(--c,#E8472B) 7%,#fff);
  border:1px solid color-mix(in srgb,var(--c,#E8472B) 22%,transparent);
  border-left:3px solid var(--c,#E8472B);
  border-radius:var(--rm);padding:13px 14px;margin-bottom:10px;
}
.care-alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.care-alert-lbl{
  font-family:var(--mono);font-size:10px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--c,#E8472B);display:block;margin-bottom:5px;
}
.care-alert-txt{font-size:14px;line-height:1.5;color:var(--ink)}
.routine-wrap{
  border:1px solid rgba(0,0,0,.08);border-radius:var(--rs);overflow:hidden;
}
.routine-summary{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);padding:11px 13px;cursor:pointer;list-style:none;
  display:flex;align-items:center;justify-content:space-between;user-select:none;
  background:#F5F5F5;
}
.routine-summary::-webkit-details-marker{display:none}
.routine-summary::after{content:'↓';font-size:11px;color:var(--faint);transition:transform .2s var(--ease)}
details[open] .routine-summary::after{transform:rotate(180deg)}
.routine-wrap .checklist{padding:0 13px 4px}

.anexo-skills{margin-top:4px}
.anexo-item{
  padding:13px 0;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.anexo-item:last-child{border-bottom:0}
.anexo-name{
  font-family:var(--display);font-weight:600;font-size:13.5px;
  letter-spacing:-.01em;color:var(--c,#E8472B);
  display:block;margin-bottom:5px;
}
.anexo-ctx{
  font-size:13px;line-height:1.55;color:var(--muted);display:block;
}
.prompt-section{margin-top:4px}
.prompt-box{
  background:#F5F5F5;border:1px solid rgba(0,0,0,.07);
  border-left:3px solid var(--c,#E8472B);
  border-radius:var(--rm);padding:14px 14px 12px;
}
.prompt-txt{
  font-family:var(--mono);font-size:11.5px;line-height:1.6;
  color:var(--muted);margin:0 0 12px;
  letter-spacing:.01em;
}

let drawerMode=null; // 'picker'|'detail'|'note'
let activeCell=null; // {week, day}
let lastFocus=null;
const SK={w:n=>`er5_w${n}`};

function getW(n){if(!wkData[n])wkData[n]={sel:{},status:{},note:''};return wkData[n]}
function saveW(n){try{localStorage.setItem(SK.w(n),JSON.stringify(getW(n)))}catch(e){}}
function loadAll(){
  const VER='rblx-2026-v1';
  if(localStorage.getItem('schedVer')!==VER){
    // New version — wipe old data, use default schedule
    for(let i=1;i<=13;i++) localStorage.removeItem(SK.w(i));
    localStorage.setItem('schedVer',VER);
    return; // keep wkData defaults
  }
  for(let i=1;i<=13;i++){
    try{
      const d=localStorage.getItem(SK.w(i));
      if(d){const p=JSON.parse(d);if(Object.keys(p.sel||{}).length)wkData[i]=p;else if(p.note)wkData[i].note=p.note;}
    }catch(e){}
  }
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function getPhase(n){return PHASES.find(p=>n>=p.r[0]&&n<=p.r[1])||PHASES[0]}
function phaseIdx(n){return PHASES.findIndex(p=>n>=p.r[0]&&n<=p.r[1])}

/* ════════════ CURRENT WEEK ════════════ */
function currentWeekNum(){
  // Could be config-driven; default to 1
  return parseInt(localStorage.getItem('er5_cw')||'1');
}

/* ════════════ STATS ════════════ */
function updateStats(){
  let filled=0,pub=0;
  for(let i=1;i<=13;i++){
    const w=wkData[i];if(!w)continue;
    Object.keys(w.sel||{}).forEach(di=>{
      filled++;
      if((w.status||{})[di]==='published')pub++;
    });
  }
  // stats removed

  // Update topbar phase (based on current week)
  const cw=currentWeekNum();
  const ph=getPhase(cw);
  document.documentElement.style.setProperty('--pc',ph.color);
  document.getElementById('brandDot').style.background=ph.color;
  document.getElementById('phaseChip').textContent=ph.name;
}

/* ════════════ BUILD GRID ════════════ */
function buildGrid(){
  const grid=document.getElementById('progGrid');
  grid.innerHTML='';

  // Corner
  const corner=document.createElement('div');
  corner.className='col-hd-corner';
  grid.appendChild(corner);

  // Column headers
  DAYS.forEach(day=>{
    const hd=document.createElement('div');
    hd.className='col-hd';
    hd.style.setProperty('--dc',day.color);
    hd.innerHTML=`
      <span class="ch-day">${esc(day.day)}</span>
      <span class="ch-theme">${esc(day.theme)} · ${esc(day.fn)}</span>
      <span class="ch-syn">${esc(day.syn||'')}</span>`;
    grid.appendChild(hd);
  });

  // Phase dividers + week rows
  const cw=currentWeekNum();
  let lastPhase=-1;

  for(let w=1;w<=13;w++){
    const phI=phaseIdx(w);
    if(phI!==lastPhase){
      lastPhase=phI;
      const ph=PHASES[phI];
      const div=document.createElement('div');
      div.className='phase-row';
      div.style.setProperty('--phc',ph.color);
      div.style.borderLeft=`5px solid ${ph.color}`;
      div.style.background=`color-mix(in srgb,${ph.color} 8%,#fff)`;
      div.innerHTML=`
        <span class="phase-row-name">${esc(ph.name)}</span>
        <span class="phase-row-weeks">Weeks ${ph.r[0]}–${ph.r[1]}</span>
        <span class="phase-row-desc">${esc(ph.desc)}</span>`;
      grid.appendChild(div);
    }

    const isCurr=w===cw;
    const wData=getW(w);

    // Week label
    const lbl=document.createElement('button');
    lbl.className='week-lbl'+(isCurr?' curr':'');
    const hasNote=!!(wData.note&&wData.note.trim());
    lbl.innerHTML=`
      <div class="wl-num">Semana ${w}${isCurr?'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--pc);margin-left:7px;vertical-align:middle"></span>':''}</div>
      <div class="wl-note-icon ${hasNote?'has-note':''}">
        ${hasNote?'✎ nota':'✎'}
      </div>`;
    lbl.addEventListener('click',()=>openNote(w));
    grid.appendChild(lbl);

    // Day cells
    DAYS.forEach((day,di)=>{
      const selIdx=wData.sel[di];
      const st=wData.status[di]||'planned';
      const filled=selIdx!=null;
      const opt=filled?day.options[selIdx]:null;

      const cell=document.createElement('button');
      cell.className='gcell'+(filled?' gcell--filled':' gcell--empty')+(isCurr?' curr-row':'');
      cell.style.setProperty('--dc',day.color);
      cell.dataset.week=w;cell.dataset.day=di;

      if(filled){
        const iconSvg=(ICONS[opt.iconKey]||'').replace('stroke="currentColor"',`stroke="${day.color}"`);
        cell.innerHTML=`
          <div class="cell-title"><span class="cell-icon">${iconSvg}</span>${esc(opt.title)}</div>
          <div class="cell-meta">
            <span class="cell-status ${st}"></span>
          </div>`;
      }else{
        cell.innerHTML=`<div class="cell-plus">+</div>`;
      }

      cell.addEventListener('click',()=>{
        if(filled) openDetail(w,di);
        else openPicker(w,di);
      });

      grid.appendChild(cell);
    });
  }
}

/* ════════════ DRAWER OPEN/CLOSE ════════════ */
function openDrawer(mode,kickText,titleText,subText,dayColor){
  lastFocus=document.activeElement;
  drawerMode=mode;

  const drawer=document.getElementById('drawer');
  const drHd=document.getElementById('drHd');
  const execBar=document.getElementById('execBar');

  drawer.style.setProperty('--c',dayColor||'#E8472B');
  drHd.style.setProperty('--c',dayColor||'#E8472B');
  document.getElementById('drKick').textContent=kickText;
  document.getElementById('drTitle').textContent=titleText;
  document.getElementById('drSub').textContent=subText;

  execBar.classList.toggle('hidden',mode!=='detail');

  drawer.classList.add('open');
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('closeDrawer').focus();
  document.addEventListener('keydown',onEsc);
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  document.removeEventListener('keydown',onEsc);
  drawerMode=null;activeCell=null;
  if(lastFocus)lastFocus.focus();
}
function onEsc(e){if(e.key==='Escape')closeDrawer()}

/* ════════════ PICKER MODE ════════════ */
function openPicker(w,di){
  activeCell={week:w,day:di};
  const day=DAYS[di];
  const ph=getPhase(w);
  const pIdx=phaseIdx(w);

  openDrawer('picker',
    `Semana ${w} · ${day.theme} · ${ph.name}`,
    `Escolher ação`,
    day.objective,
    day.color
  );

  const body=document.getElementById('drBody');
  body.innerHTML=`
    <div class="picker-ctx">
      <span class="ctx-tag">${esc(ph.name)}</span>
      <span class="ctx-tag">Semana ${w}</span>
    </div>
    <div class="picker-options" id="pickerOpts"></div>`;

  const opts=document.getElementById('pickerOpts');
  day.options.forEach((opt,oi)=>{
    const fit=opt.pf[pIdx];
    const fitTag=fit===2?'<span class="ptag rec">Recomendada</span>':fit===0?'<span class="ptag off">Fora de fase</span>':'';
    // Check recency
    let recentTag='';
    for(let pw=w-1;pw>=Math.max(1,w-4);pw--){
      if((wkData[pw]?.sel||{})[di]===oi){
        const ago=w-pw;
        if(ago===1)
          recentTag=`<span class="ptag recent-0">↩ Semana passada</span>`;
        else if(ago<=3)
          recentTag=`<span class="ptag recent-1">Há ${ago} semanas</span>`;
        else
          recentTag=`<span class="ptag recent-2">Há ${ago} semanas</span>`;
        break;
      }
    }

    const btn=document.createElement('button');
    btn.className='popt';
    btn.style.setProperty('--c',day.color);
    btn.innerHTML=`
      <div class="popt-title"><span class="popt-icon">${(ICONS[opt.iconKey]||'').replace('stroke="currentColor"',`stroke="${day.color}"`)}</span>${esc(opt.title)}</div>
      <div class="popt-meta">${fitTag}${recentTag}</div>
      <div class="popt-desc">${esc(opt.obj)}</div>`;

    btn.addEventListener('click',()=>{
      const wk=getW(w);
      wk.sel[di]=oi;
      if(!wk.status[di])wk.status[di]='planned';
      saveW(w);
      updateCell(w,di);
      updateStats();
      openDetail(w,di);
    });
    opts.appendChild(btn);
  });
}

/* ════════════ DETAIL MODE ════════════ */
function openDetail(w,di){
  activeCell={week:w,day:di};
  const day=DAYS[di];
  const wk=getW(w);
  const selIdx=wk.sel[di];
  if(selIdx==null){openPicker(w,di);return}
  const opt=day.options[selIdx];
  const st=wk.status[di]||'planned';
  const ph=getPhase(w);

  openDrawer('detail',
    `Semana ${w} · ${day.theme} · ${ph.name}`,
    opt.title,
    opt.obj,
    day.color
  );

  // Exec buttons
  document.querySelectorAll('.exec-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===st));

  const body=document.getElementById('drBody');
  body.innerHTML=`
    <div class="goal-strip"><b>Objective</b>${esc(opt.obj)}</div>

    ${opt.skills?`<div class="detail-skills">
      <span class="dsk-lbl">Competências</span>
      <div class="dsk-pills">${opt.skills.map(s=>`<span class="dsk-pill">${esc(s)}</span>`).join('')}</div>
    </div>`:''}

    <section class="channel">
      <header class="ch-hd">
        <span class="ch-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
        <div class="ch-id"><div class="ch-name">Reach</div><div class="ch-meta">${esc(opt.fmt)}</div></div>
        <span class="ch-tag">Social feed</span>
      </header>
      <div class="ch-body">
        <div class="lane">
          <span class="lane-lbl">Production</span>
          <div class="field"><b>Primary audience</b>${esc(opt.aud)}</div>
          <p class="dr-sec">Script</p>
          <div class="script">
            ${opt.script.map(l=>`<div class="beat"><div class="beat-lbl">${esc(l[0])}</div><div class="beat-txt">${esc(l[1])}</div></div>`).join('')}
          </div>
        </div>
        <div class="lane lane--pub">
          <div class="lane-hd">
            <span class="lane-lbl">Publication · Caption</span>
            <span class="ready-tag">Ready to publish</span>
          </div>
          <div class="caption-box">
            <p id="captTxt">${esc(opt.caption)}</p>
            <button class="copy-btn" id="copyBtn">Copy caption</button>
          </div>
        </div>
      </div>
    </section>

    <section class="channel channel--discord">
      <header class="ch-hd">
        <span class="ch-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span>
        <div class="ch-id"><div class="ch-name">Discord</div><div class="ch-meta">${esc(opt.discordAction)}</div></div>
        <span class="ch-tag">Server</span>
      </header>
      <div class="ch-body">
        <div class="lane">
          <div class="lane-hd">
            <span class="lane-lbl">Message for the server</span>
            <span class="ready-tag">Ready to post</span>
          </div>
          <div class="caption-box">
            <p id="discordMsgTxt">${esc(opt.discordMsg||opt.discordAction)}</p>
            <button class="copy-btn" id="copyDiscord">Copy message</button>
          </div>
        </div>
      </div>
    </section>

    <div class="care-section">
      <p class="dr-sec">Caution for this action</p>
      <div class="care-alert">
        <span class="care-alert-icon">⚠</span>
        <div>
          <span class="care-alert-lbl">Attention</span>
          <span class="care-alert-txt">${esc(opt.care)}</span>
        </div>
      </div>
    </div>

    ${opt.skills&&opt.skills.length?`
    <div class="anexo-skills">
      <p class="dr-sec">Skills</p>
      ${opt.skills.map(s=>`
        <div class="anexo-item">
          <span class="anexo-name">${esc(s)}</span>
          ${SKILL_CONTEXT[s]?`<span class="anexo-ctx">${esc(SKILL_CONTEXT[s])}</span>`:''}
        </div>
      `).join('')}
    </div>`:''}
`;

  document.getElementById('copyBtn').addEventListener('click',async()=>{
    try{await navigator.clipboard.writeText(opt.caption)}catch(e){}
    const b=document.getElementById('copyBtn');
    b.textContent='Copied';b.classList.add('done');
    setTimeout(()=>{b.textContent='Copy caption';b.classList.remove('done')},1800);
  });

  document.getElementById('copyPrompt')?.addEventListener('click',function(){
    navigator.clipboard.writeText(opt.prompt||'');
    this.textContent='Copied';this.classList.add('done');
    setTimeout(()=>{this.textContent='Copy prompt';this.classList.remove('done');},2000);
  });
  document.getElementById('copyDiscord').addEventListener('click',async()=>{
    const msg=(opt.discordMsg||opt.discordAction).replace(/\\n/g,'\n');
    try{await navigator.clipboard.writeText(msg)}catch(e){}
    const b=document.getElementById('copyDiscord');
    b.textContent='Copied';b.classList.add('done');
    setTimeout(()=>{b.textContent='Copy message';b.classList.remove('done')},1800);
  });
}

/* ════════════ NOTE MODE ════════════ */
function openNote(w){
  activeCell={week:w,day:null};
  const wk=getW(w);
  const ph=getPhase(w);

  openDrawer('note',
    `Week ${w} · ${ph.name}`,
    'Community pulse',
    'Record what happened this week.',
    ph.color
  );

  document.getElementById('execBar').classList.add('hidden');

  const body=document.getElementById('drBody');
  body.innerHTML=`
    <div class="note-mode">
      <textarea id="noteTA" placeholder="New members, Discord engagement, projects submitted, what worked or not…">${esc(wk.note||'')}</textarea>
      <button class="note-save" id="noteSaveBtn">Salvar nota</button>
    </div>`;

  document.getElementById('noteSaveBtn').addEventListener('click',()=>{
    wk.note=document.getElementById('noteTA').value;
    saveW(w);
    const btn=document.getElementById('noteSaveBtn');
    btn.textContent='Saved';btn.classList.add('saved');
    setTimeout(()=>{btn.textContent='Save note';btn.classList.remove('saved')},1800);
    // Refresh week label to show note indicator
    buildGrid();
    updateStats();
  });
}

/* ════════════ UPDATE SINGLE CELL ════════════ */
function updateCell(w,di){
  const cell=document.querySelector(`.gcell[data-week="${w}"][data-day="${di}"]`);
  if(!cell)return;
  const wk=getW(w);
  const selIdx=wk.sel[di];
  const opt=DAYS[di].options[selIdx];
  const day=DAYS[di];
  const st=wk.status[di]||'planned';
  const iconSvg=(ICONS[opt.iconKey]||'').replace('stroke="currentColor"',`stroke="${day.color}"`);
  cell.className=`gcell gcell--filled${w===currentWeekNum()?' curr-row':''}`;
  cell.style.setProperty('--dc',day.color);
  cell.innerHTML=`
    <div class="cell-title"><span class="cell-icon">${iconSvg}</span>${esc(opt.title)}</div>
    <div class="cell-meta">
      <span class="cell-status ${st}"></span>
    </div>`;
  cell.onclick=()=>openDetail(w,di);
}

/* ════════════ EVENTS ════════════ */
document.getElementById('closeDrawer').addEventListener('click',closeDrawer);
document.getElementById('backdrop').addEventListener('click',closeDrawer);

document.querySelectorAll('.exec-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!activeCell||activeCell.day===null)return;
    const {week:w,day:di}=activeCell;
    const st=btn.dataset.s;
    getW(w).status[di]=st;saveW(w);
    document.querySelectorAll('.exec-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===st));
    // Update cell dot
    const cell=document.querySelector(`.gcell[data-week="${w}"][data-day="${di}"]`);
    if(cell){const dot=cell.querySelector('.cell-status');if(dot)dot.className=`cell-status ${st}`}
    updateStats();
  });
});

document.getElementById('changeBtn').addEventListener('click',()=>{
  if(activeCell)openPicker(activeCell.week,activeCell.day);
});

document.getElementById('removeBtn').addEventListener('click',()=>{
  if(!activeCell||activeCell.day===null)return;
  const {week:w,day:di}=activeCell;
  const wk=getW(w);
  delete wk.sel[di];
  delete wk.status[di];
  saveW(w);
  // Restore cell to empty
  const cell=document.querySelector(`.gcell[data-week="${w}"][data-day="${di}"]`);
  if(cell){
    const isCurr=w===currentWeekNum();
    cell.className=`gcell gcell--empty${isCurr?' curr-row':''}`;
    cell.innerHTML=`<div class="cell-plus">+</div>`;
    cell.onclick=()=>openPicker(w,di);
  }
  updateStats();
  closeDrawer();
});

/* ════════════ INIT ════════════ */
loadAll();
prepopulate();
buildGrid();
updateStats();
</script>
</body>
</html>
